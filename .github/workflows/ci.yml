name: Production CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Debug Directory (IMPORTANT)
        run: |
          pwd
          ls -R

      - name: Run Tests
        run: PYTHONPATH=$(pwd) pytest -v

      - name: Build Docker Image
        run: docker build -t ci-cd-app .

      - name: Save Docker Image Artifact
        run: docker save ci-cd-app | gzip > image.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz